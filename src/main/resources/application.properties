spring.application.name=Veristay

# Let Render choose the port, but default to 8080 locally
server.port=${PORT:8080}

# Cloud Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/veristay_db3}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:1428}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# EXACT WORKING UPLOAD CONFIG FROM OLD PROJECT
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB
server.tomcat.max-swallow-size=-1

# File Storage
file.upload-dir=uploads
spring.web.resources.static-locations=file:uploads/,classpath:/static/