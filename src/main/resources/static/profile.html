<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | VeriStay</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen relative overflow-x-hidden selection:bg-teal-200 selection:text-teal-900">

    <div class="fixed top-[0%] left-[50%] w-[600px] h-[600px] bg-teal-300/20 rounded-full mix-blend-multiply filter blur-[120px] z-0 transform -translate-x-1/2 pointer-events-none"></div>

    <header class="glass-nav sticky top-0 z-50 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center relative z-20">
            <a href="/" class="flex items-center gap-3 group">
                <div class="relative flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-500 shadow-lg shadow-teal-500/30 group-hover:-translate-y-1 transition-all duration-300">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <div class="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5 shadow-sm">
                        <div class="bg-cyan-500 rounded-full w-3.5 h-3.5 flex items-center justify-center">
                            <svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </div>
                    </div>
                </div>
                <span class="text-2xl font-extrabold text-slate-800 tracking-tight group-hover:text-teal-700 transition-colors">VeriStay</span>
            </a>

            <nav class="hidden md:flex items-center gap-8 font-medium text-slate-600">
                <a href="/about.html" class="hover:text-teal-600 transition-colors">About</a>
                <a href="/contact.html" class="hover:text-teal-600 transition-colors">Contact</a>
                <div id="nav-auth-container" class="flex items-center gap-4"></div>
            </nav>

            <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-600 hover:text-teal-600 focus:outline-none transition-colors">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden absolute top-20 left-0 w-full glass-panel border-t border-white/50 shadow-xl z-10 origin-top animate-fade-in-down">
            <div class="px-4 pt-4 pb-6 space-y-4 flex flex-col">
                <a href="/about.html" class="block px-4 py-3 rounded-xl hover:bg-teal-50 text-slate-700 font-medium transition-colors">About</a>
                <a href="/contact.html" class="block px-4 py-3 rounded-xl hover:bg-teal-50 text-slate-700 font-medium transition-colors">Contact</a>
                <div id="mobile-auth-container" class="border-t border-slate-200/50 pt-4 flex flex-col gap-3 px-4"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-16 max-w-3xl flex-grow relative z-10">
        <div class="text-center mb-10" data-aos="fade-down">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">Account Settings</h1>
            <p class="text-slate-500 mt-2 font-light">Manage your personal information and security preferences.</p>
        </div>

        <div class="glass-panel p-8 sm:p-12 rounded-[2.5rem]" data-aos="fade-up">
            
            <div class="flex items-center gap-6 mb-10 pb-10 border-b border-slate-200/60">
                <div class="w-24 h-24 bg-gradient-to-br from-teal-100 to-cyan-100 rounded-3xl flex items-center justify-center text-teal-700 text-4xl font-bold shadow-inner border border-white" id="profile-avatar">
                    U
                </div>
                <div>
                    <h3 class="text-3xl font-extrabold text-slate-800 tracking-tight" id="display-name">Loading...</h3>
                    <span id="display-role" class="bg-slate-900 text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider mt-3 inline-block shadow-sm">Role</span>
                </div>
            </div>

            <form id="profileForm" class="space-y-6">
                
                <div class="space-y-1">
                    <label class="block text-sm font-bold text-slate-700 ml-1">Account Email <span class="text-slate-400 font-normal">(Locked)</span></label>
                    <input type="email" id="profEmail" readonly class="w-full px-5 py-4 bg-slate-100/50 text-slate-500 border border-slate-200/60 rounded-2xl shadow-inner cursor-not-allowed outline-none font-medium">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-1">
                        <label class="block text-sm font-bold text-slate-700 ml-1">Full Name</label>
                        <input type="text" id="profName" required class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                    </div>
                    <div class="space-y-1">
                        <label class="block text-sm font-bold text-slate-700 ml-1">Phone Number</label>
                        <input type="tel" id="profPhone" required class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                    </div>
                </div>

                <div class="pt-6 mt-6 border-t border-slate-200/60 space-y-1">
                    <h4 class="font-extrabold text-slate-800 mb-4 text-lg">Security</h4>
                    <label class="block text-sm font-bold text-slate-700 ml-1">New Password <span class="text-slate-400 font-normal">(Leave blank to keep current)</span></label>
                    <input type="password" id="profPassword" placeholder="Enter new password..." class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                </div>

                <div class="pt-8">
                    <button type="submit" id="updateBtn" class="w-full bg-slate-900 hover:bg-teal-600 text-white font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg hover-lift">
                        Save Changes
                    </button>
                    <div id="profileStatus" class="mt-4 text-center hidden p-3 rounded-xl font-bold text-sm"></div>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800 rounded-t-[3rem] mx-2 sm:mx-4 mb-2 relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-6 text-center md:text-left">
            <div class="flex items-center gap-3 group cursor-pointer">
                <div class="relative flex items-center justify-center w-8 h-8 rounded-lg bg-slate-700 group-hover:bg-teal-600 transition-colors duration-300">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <div class="absolute -bottom-1 -right-1 bg-slate-900 rounded-full p-0.5"><div class="bg-white rounded-full w-2.5 h-2.5 flex items-center justify-center"><svg class="w-2 h-2 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div></div>
                </div>
                <span class="text-xl font-bold text-white tracking-tight">VeriStay</span>
            </div>
            <p class="text-sm">© 2026 VeriStay. Architected for the modern web.</p>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => { mobileMenu.classList.toggle('hidden'); });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="auth.js"></script>
    <script src="profile.js"></script>
</body>
</html>
