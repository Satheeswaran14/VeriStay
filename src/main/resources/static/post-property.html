<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post Property | VeriStay</title>
	<link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="global.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen relative overflow-x-hidden selection:bg-teal-200 selection:text-teal-900">

    <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] bg-teal-400/20 rounded-full mix-blend-multiply filter blur-[120px] z-0 pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-cyan-400/10 rounded-full mix-blend-multiply filter blur-[120px] z-0 pointer-events-none"></div>

    <header class="glass-nav sticky top-0 z-50 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center relative z-20">
            <a href="/" class="flex items-center gap-3 group">
                <div class="relative flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-teal-500 to-cyan-500 shadow-lg shadow-teal-500/30 group-hover:-translate-y-1 transition-all duration-300">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    <div class="absolute -bottom-1 -right-1 bg-white rounded-full p-0.5 shadow-sm"><div class="bg-cyan-500 rounded-full w-3.5 h-3.5 flex items-center justify-center"><svg class="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div></div>
                </div>
                <span class="text-2xl font-extrabold text-slate-800 tracking-tight group-hover:text-teal-700 transition-colors">VeriStay</span>
            </a>

            <div id="nav-auth-container" class="hidden md:flex items-center gap-4"></div>

            <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-600 hover:text-teal-600 focus:outline-none transition-colors">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden absolute top-20 left-0 w-full glass-panel border-t border-white/50 shadow-xl z-10 origin-top animate-fade-in-down">
            <div class="px-4 pt-4 pb-6 space-y-4 flex flex-col">
                <div id="mobile-auth-container" class="flex flex-col gap-3 px-4"></div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-12 sm:py-16 max-w-4xl flex-grow relative z-10">
        
        <div class="text-center mb-12" data-aos="fade-down" data-aos-duration="600">
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">List Your Property</h1>
            <p class="text-slate-500 mt-4 max-w-2xl mx-auto font-light text-lg">Provide detailed information to make your property stand out. Upload a main photo and one optional secondary photo.</p>
        </div>
        
        <div class="glass-panel p-8 sm:p-12 rounded-[2.5rem] shadow-2xl" data-aos="fade-up" data-aos-duration="800" data-aos-delay="100">
            <form id="propertyForm" class="space-y-10">
                
                <div class="space-y-6">
                    <h3 class="text-xl font-extrabold text-slate-800 border-b border-slate-200/60 pb-3 flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-teal-100 text-teal-700 flex items-center justify-center text-sm">1</span> Basic Details
                    </h3>
                    
                    <div class="space-y-1">
                        <label for="title" class="block text-sm font-bold text-slate-700 ml-1">Property Title <span class="text-red-500">*</span></label>
                        <input type="text" id="title" required placeholder="e.g., Luxury 3BHK Apartment in Downtown" class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label for="price" class="block text-sm font-bold text-slate-700 ml-1">Total Price (₹) <span class="text-red-500">*</span></label>
                            <input type="number" id="price" required min="1" placeholder="e.g., 7500000" class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                        </div>
                        <div class="space-y-1">
                            <label for="location" class="block text-sm font-bold text-slate-700 ml-1">Location / City <span class="text-red-500">*</span></label>
                            <input type="text" id="location" required placeholder="e.g., Andheri West, Mumbai" class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                        </div>
                    </div>
                </div>

                <div class="bg-slate-100/50 p-6 sm:p-8 rounded-[2rem] border border-slate-200/60 space-y-6 shadow-inner">
                    <h3 class="text-xl font-extrabold text-slate-800 border-b border-slate-200/60 pb-3 flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-cyan-100 text-cyan-700 flex items-center justify-center text-sm">2</span> Specifications
                    </h3>

                    <div class="space-y-1">
                        <label for="propertyType" class="block text-sm font-bold text-slate-700 ml-1">Property Type <span class="text-red-500">*</span></label>
                        <select id="propertyType" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all duration-300 cursor-pointer">
                            <option value="BUY_HOUSE">Buy House / Apartment</option>
                            <option value="RENT_HOUSE">Rent House / Apartment</option>
                            <option value="BUY_LAND">Buy Plot / Land</option>
                            <option value="PG_HOSTEL">PG / Hostel</option>
                        </select>
                    </div>
                    
                    <div id="plotSizeField" class="hidden transition-all space-y-1">
                        <label for="areaSize" class="block text-sm font-bold text-slate-700 ml-1">Plot Size / Area <span class="text-red-500">*</span></label>
                        <input type="text" id="areaSize" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all duration-300" placeholder="e.g., 1500 sq ft">
                    </div>
                    
                    <div id="amenitiesField" class="hidden transition-all space-y-1">
                        <label for="amenities" class="block text-sm font-bold text-slate-700 ml-1">Included Amenities <span class="text-red-500">*</span></label>
                        <input type="text" id="amenities" class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all duration-300" placeholder="e.g., WiFi, AC, Daily Meals">
                    </div>
                    
                    <div class="space-y-1">
                        <label for="description" class="block text-sm font-bold text-slate-700 ml-1">Detailed Description <span class="text-red-500">*</span></label>
                        <textarea id="description" rows="5" required placeholder="Highlight the best features of your property..." class="w-full px-5 py-4 bg-white border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all duration-300 resize-none"></textarea>
                    </div>
                </div>
                
                <div class="space-y-6">
                    <h3 class="text-xl font-extrabold text-slate-800 border-b border-slate-200/60 pb-3 flex items-center gap-2">
                        <span class="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-sm">3</span> Contact & Media
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-1">
                            <label for="ownerName" class="block text-sm font-bold text-slate-700 ml-1">Owner Full Name <span class="text-red-500">*</span></label>
                            <input type="text" id="ownerName" required class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                        </div>
                        <div class="space-y-1">
                            <label for="ownerContact" class="block text-sm font-bold text-slate-700 ml-1">Contact Number <span class="text-red-500">*</span></label>
                            <input type="tel" id="ownerContact" required class="w-full px-5 py-4 bg-white/50 border border-slate-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:bg-white transition-all duration-300">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
                        <div class="bg-teal-50/50 p-6 rounded-[1.5rem] border border-teal-100">
                            <label for="imageFile" class="block text-teal-900 font-extrabold mb-1">Main Photo <span class="text-red-500">*</span></label>
                            <p class="text-xs text-teal-700 mb-4 font-medium">Required cover image.</p>
                            <input type="file" id="imageFile" accept="image/jpeg, image/png, image/webp" class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-teal-600 file:text-white hover:file:bg-teal-700 transition-colors cursor-pointer" required>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-[1.5rem] border border-slate-200">
                            <label for="secondaryImageFile" class="block text-slate-800 font-extrabold mb-1">Secondary Photo</label>
                            <p class="text-xs text-slate-500 mb-4 font-medium">Optional extra angle.</p>
                            <input type="file" id="secondaryImageFile" accept="image/jpeg, image/png, image/webp" class="w-full text-sm text-slate-500 file:mr-4 file:py-3 file:px-5 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-slate-800 file:text-white hover:file:bg-slate-900 transition-colors cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="pt-8 border-t border-slate-200/60">
                    <button type="submit" id="submitBtn" class="w-full bg-slate-900 hover:bg-teal-600 text-white font-bold py-5 rounded-2xl shadow-lg transition-all duration-300 flex justify-center items-center gap-2 text-lg hover-lift">
                        Publish Property Listing
                    </button>
                    <div id="statusMessage" class="mt-6 hidden transition-all duration-300"></div>
                </div>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-12 border-t border-slate-800 rounded-t-[3rem] mx-2 sm:mx-4 mb-2 relative z-10">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm">© 2026 VeriStay. Empowering Owners.</p>
        </div>
    </footer>

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        menuBtn.addEventListener('click', () => { mobileMenu.classList.toggle('hidden'); });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="auth.js"></script>
    <script src="post-property.js"></script>
</body>
</html>
